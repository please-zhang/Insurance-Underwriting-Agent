active_provider: claude

claude:
  api_key: ${ANTHROPIC_API_KEY}
  model: claude-opus-4-6
  max_tokens: 4096
  timeout: 30

glm4:
  base_url: http://192.168.x.x:8080/v1
  api_key: none
  model: glm-4
  max_tokens: 2048
  timeout: 60

openai:
  api_key: ${OPENAI_API_KEY}
  model: gpt-4o
  max_tokens: 4096
  timeout: 30
